<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="100" y1="40" x2="1100" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1520"/>
      <stop offset="1" stop-color="#050811"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#7FFF6B"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(0,212,255,0.11)" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.55"/>

  <circle cx="1050" cy="110" r="140" fill="#00D4FF" opacity="0.07"/>
  <circle cx="130" cy="560" r="190" fill="#7FFF6B" opacity="0.06"/>

  <text x="94" y="146" fill="#00D4FF" font-family="IBM Plex Mono, monospace" font-size="24" letter-spacing="5">WEB3 FUNDAMENTALS</text>
  <text x="94" y="252" fill="#F0F8FF" font-family="Syne, sans-serif" font-weight="800" font-size="78">Step into</text>
  <text x="94" y="336" fill="url(#accentGrad)" font-family="Syne, sans-serif" font-weight="800" font-size="86">Crypto</text>

  <g filter="url(#softGlow)">
    <circle cx="452" cy="306" r="20" fill="#7FFF6B"/>
    <path d="M447 288C460 295 462 309 454 321C468 315 472 304 468 292C463 281 454 280 447 288Z" fill="#00D4FF"/>
  </g>

  <text x="94" y="420" fill="#C8DFF5" font-family="Noto Sans KR, sans-serif" font-size="34" font-weight="700">
    블록체인 기초부터 DeFi, MEV까지
  </text>
  <text x="94" y="470" fill="#C8DFF5" font-family="Noto Sans KR, sans-serif" font-size="30" font-weight="400">
    크립토 개념을 공부하는 작은 방.
  </text>

  <rect x="94" y="520" width="360" height="58" rx="14" stroke="#1E3A5F" fill="rgba(0,212,255,0.05)"/>
  <text x="120" y="558" fill="#00D4FF" font-family="IBM Plex Mono, monospace" font-size="22">stepintocrypto.xyz</text>
</svg>
